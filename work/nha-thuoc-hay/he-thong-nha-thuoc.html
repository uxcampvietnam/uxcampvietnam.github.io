<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhà Thuốc Hay - Hệ thống nhà thuốc</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .store-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      margin-top: 20px;
    }
    @media (max-width: 768px) {
      .store-layout { grid-template-columns: 1fr; }
    }
    .store-list {
      max-height: 480px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      background: var(--bg-card);
    }
    .store-item {
      padding: 16px;
      border-bottom: 1px solid var(--wireframe-gray);
      cursor: pointer;
      transition: var(--transition);
    }
    .store-item:hover, .store-item.active {
      background: var(--bg-secondary);
    }
    .store-item h4 {
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--text-primary);
    }
    .store-item p {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .map-placeholder {
      border: 2px solid var(--text-primary);
      background: var(--bg-card);
      border-radius: var(--border-radius);
      height: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .map-grid-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(to right, var(--bg-secondary) 1px, transparent 1px),
        linear-gradient(to bottom, var(--bg-secondary) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
    .map-pin {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #ef4444;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: -2px 2px 4px rgba(0,0,0,0.3);
    }
    .map-pin::after {
      content: "";
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
    }
    .map-pin.active {
      background: #3b82f6;
      transform: rotate(-45deg) scale(1.3);
    }
  </style>
</head>
<body>

  <header></header>

  <main class="container">
    <div class="breadcrumbs">
      <a href="index.html">Trang chủ</a> &gt; <span>Hệ thống nhà thuốc</span>
    </div>

    <div class="section-title">
      <span>TÌM HỆ THỐNG NHÀ THUỐC HAY GẦN NHẤT</span>
    </div>

    <!-- Location Dropdowns -->
    <div style="background:var(--bg-card); border:1px solid var(--border-color); padding:16px; border-radius:var(--border-radius); display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px;">
      <div style="flex:1; min-width:200px;">
        <label class="form-label" style="font-weight:700;">Tỉnh / Thành phố</label>
        <select id="prov-select" class="form-control">
          <option value="HN">Hà Nội</option>
          <option value="HCM">TP. Hồ Chí Minh</option>
          <option value="DN">Đà Nẵng</option>
        </select>
      </div>
      <div style="flex:1; min-width:200px;">
        <label class="form-label" style="font-weight:700;">Quận / Huyện</label>
        <select id="dist-select" class="form-control">
          <!-- Loaded dynamically -->
        </select>
      </div>
      <div style="display:flex; align-items:flex-end; min-width:120px;">
        <button class="btn-submit" id="btn-reset-map" style="padding:10px;">Làm mới bộ lọc</button>
      </div>
    </div>

    <!-- Main Store Panel -->
    <div class="store-layout">
      
      <!-- Store list -->
      <div>
        <div class="store-list" id="stores-list-container">
          <!-- Loaded dynamically -->
        </div>
      </div>

      <!-- Map Simulator -->
      <div class="map-placeholder">
        <div class="map-grid-bg"></div>
        <div style="z-index:1; text-align:center; background:rgba(255,255,255,0.9); padding:12px; border-radius:4px; border:1px solid var(--border-color);">
          <strong style="color:var(--text-primary);">SƠ ĐỒ BẢN ĐỒ WIREFRAME (MÔ PHỎNG MAP)</strong>
          <p style="font-size:12px; color:var(--text-muted); margin-top:4px;">Nhấp vào vị trí ghim để xem thông tin chi tiết</p>
        </div>
        
        <div id="pins-container">
          <!-- Pins rendered dynamically on top of simulated coordinates -->
        </div>
      </div>

    </div>
  </main>

  <footer></footer>

  <script src="products_data.js"></script>
  <script src="common.js"></script>
  <script>
    // Mock stores database
    const STORES_DB = [
      { id: 1, prov: "HN", dist: "HBT", name: "Nhà thuốc Hay số 1: NHÀ THUỐC TƯỜNG VY", addr: "Ki ốt 10B T1, Tòa Green Pearl, số 378 phố Minh Khai, Phường Vĩnh Tuy, Thành phố Hà Nội", phone: "0366379623", hours: "07:00 - 22:30", x: 60, y: 70 },
      { id: 2, prov: "HN", dist: "DD", name: "Nhà thuốc Hay số 2: NHÀ THUỐC LAM HỒNG I", addr: "Số 77 phố Ô Đồng Lầm, Phường Văn Miếu - Quốc Tử Giám, Thành phố Hà Nội", phone: "0358605094", hours: "07:00 - 22:00", x: 45, y: 55 },
      { id: 3, prov: "HN", dist: "TL", name: "Nhà thuốc Hay số 3: NHÀ THUỐC TÂM ANH", addr: "Lô 1.03 An Bình Plaza, số 97 Phố Trần Bình, Phường Từ Liêm, Thành phố Hà Nội", phone: "0384875835", hours: "06:30 - 23:00", x: 25, y: 40 },
      { id: 4, prov: "HN", dist: "HBT", name: "Nhà thuốc Hay số 4: NHÀ THUỐC ĐĂNG DƯƠNG", addr: "Số 17 Thanh Nhàn, Phường Bạch Mai, Thành phố Hà Nội", phone: "0366318843", hours: "07:00 - 22:00", x: 55, y: 65 }
    ];

    const DISTRICTS = {
      HN: [
        { code: "HBT", name: "Hai Bà Trưng" },
        { code: "DD", name: "Đống Đa" },
        { code: "TL", name: "Nam/Bắc Từ Liêm" }
      ],
      HCM: [
        { code: "Q1", name: "Quận 1" }
      ],
      DN: [
        { code: "HC", name: "Hải Châu" }
      ]
    };

    document.addEventListener("DOMContentLoaded", () => {
      const provSelect = document.getElementById("prov-select");
      const distSelect = document.getElementById("dist-select");
      
      provSelect.addEventListener("change", () => {
        populateDistricts();
        filterStores();
      });
      
      distSelect.addEventListener("change", filterStores);
      document.getElementById("btn-reset-map").addEventListener("click", () => {
        provSelect.value = "HN";
        populateDistricts();
        filterStores();
      });
      
      populateDistricts();
      filterStores();
    });

    function populateDistricts() {
      const prov = document.getElementById("prov-select").value;
      const list = DISTRICTS[prov] || [];
      const select = document.getElementById("dist-select");
      
      select.innerHTML = list.map(d => `<option value="${d.code}">${d.name}</option>`).join("");
    }

    function filterStores() {
      const prov = document.getElementById("prov-select").value;
      const dist = document.getElementById("dist-select").value;
      
      const filtered = STORES_DB.filter(s => s.prov === prov && s.dist === dist);
      
      renderStoresList(filtered);
      renderMapPins(filtered);
    }

    function renderStoresList(stores) {
      const container = document.getElementById("stores-list-container");
      if (stores.length === 0) {
        container.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-muted);">Không có cửa hàng nào ở khu vực này.</div>`;
        return;
      }

      container.innerHTML = stores.map((s, idx) => `
        <div class="store-item ${idx === 0 ? 'active' : ''}" id="store-item-${s.id}" onclick="selectStore(${s.id})">
          <h4>${s.name}</h4>
          <p>📍 ${s.addr}</p>
          <p style="margin-top:4px;">📞 Hotline: <strong>${s.phone}</strong></p>
          <p>⏰ Mở cửa: ${s.hours}</p>
          <button class="btn-card" style="margin-top:10px; width:auto; padding:4px 12px;" onclick="showDirections('${s.name}')">Chỉ đường</button>
        </div>
      `).join("");
    }

    function renderMapPins(stores) {
      const container = document.getElementById("pins-container");
      container.innerHTML = stores.map((s, idx) => `
        <div class="map-pin ${idx === 0 ? 'active' : ''}" id="map-pin-${s.id}" style="left: ${s.x}%; top: ${s.y}%;" onclick="selectStore(${s.id})" title="${s.name}"></div>
      `).join("");
    }

    window.selectStore = function(id) {
      // Toggle store item class
      document.querySelectorAll(".store-item").forEach(item => item.classList.remove("active"));
      const activeItem = document.getElementById(`store-item-${id}`);
      if (activeItem) activeItem.classList.add("active");
      
      // Scroll list to item if needed
      activeItem?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      // Toggle map pin class
      document.querySelectorAll(".map-pin").forEach(pin => pin.classList.remove("active"));
      const activePin = document.getElementById(`map-pin-${id}`);
      if (activePin) activePin.classList.add("active");
    };

    window.showDirections = function(storeName) {
      event.stopPropagation();
      alert(`Đang mở Google Maps chỉ đường đến cửa hàng: ${storeName}`);
    };
  </script>
</body>
</html>
